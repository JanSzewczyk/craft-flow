name: Autonomous Agent 🤖

on:
  workflow_dispatch:
    inputs:
      task:
        description: "Natural-language task for the agent to perform"
        required: true

permissions:
  contents: write
  pull-requests: write

jobs:
  run-agent:
    name: Run agent
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout craft-flow
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.AGENT_PAT }}

      - name: Checkout szumrak
        uses: actions/checkout@v4
        with:
          repository: JanSzewczyk/szumrak
          path: szumrak-src

      - name: Build agent image
        run: docker build -t szumrak -f szumrak-src/docker/Dockerfile szumrak-src

      - name: Run agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.AGENT_PAT }}
          TASK: ${{ github.event.inputs.task }}
          REPO: ${{ github.repository }}
        run: |
          docker run --rm \
            -e ANTHROPIC_API_KEY -e GH_TOKEN -e TASK -e REPO \
            -v ${{ github.workspace }}:/workspace \
            szumrak

      - name: Upload agent log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agent-log
          path: ${{ github.workspace }}/agent-run.jsonl
          if-no-files-found: ignore
