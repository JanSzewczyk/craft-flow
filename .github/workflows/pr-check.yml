name: PR Checks ✅

on:
  pull_request:

env:
  CI: true
  NODE_VERSION: "24"
  SKIP_ENV_VALIDATION: true
  RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
  CONTACT_EMAIL_TO: ${{ secrets.CONTACT_EMAIL_TO }}
  NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
  CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
  NEXT_PUBLIC_CLERK_SIGN_IN_URL: /sign-in
  NEXT_PUBLIC_CLERK_SIGN_IN_FALLBACK_REDIRECT_URL: /
  NEXT_PUBLIC_CLERK_SIGN_UP_FALLBACK_REDIRECT_URL: /
  # Supabase
  DATABASE_URL: ${{ secrets.DATABASE_URL }}
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

permissions:
  pull-requests: write

jobs:
  build:
    name: Build 🏗️
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code 📚
        uses: actions/checkout@v6
      - name: Setup Node & deps ⚙️
        uses: ./.github/actions/setup-node-deps
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Build Check 🏗️
        run: npm run build

  build-storybook:
    name: Build Storybook 📖🏗️
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code 📚
        uses: actions/checkout@v6
      - name: Setup Node & deps ⚙️
        uses: ./.github/actions/setup-node-deps
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Build Check 🏗️
        run: npm run storybook:build

  prettier:
    name: Prettier 🧹
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code 📚
        uses: actions/checkout@v6
      - name: Setup Node & deps ⚙️
        uses: ./.github/actions/setup-node-deps
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Prettier Check 🧹
        run: npm run prettier:check

  lint:
    name: ESlint ⬣
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code 📚
        uses: actions/checkout@v6
      - name: Setup Node & deps ⚙️
        uses: ./.github/actions/setup-node-deps
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install utils ⚙️
        run: npm install @microsoft/eslint-formatter-sarif
      - name: ESlint Check ⬣
        run: npm run lint:ci
        continue-on-error: true

  type-check:
    name: TypeScript 🛠️
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code 📚
        uses: actions/checkout@v6
      - name: Setup Node & deps ⚙️
        uses: ./.github/actions/setup-node-deps
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: TypeScript Check 🛠️
        run: npm run type-check

  prewarm-playwright-cache:
    name: Prewarm Playwright Cache ♻️
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code 📚
        uses: actions/checkout@v6
      - name: Setup Node & deps + Playwright ⚙️
        uses: ./.github/actions/setup-node-deps
        with:
          node-version: ${{ env.NODE_VERSION }}
          install-playwright: "true"

  test:
    name: Test ${{ matrix.feature }} 🧪
    runs-on: ubuntu-latest
    needs: [prewarm-playwright-cache]
    permissions:
      contents: read
      pull-requests: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - { feature: auth, path: "features/auth/" }
          - { feature: billing, path: "features/billing/" }
          - { feature: contact, path: "features/contact/" }
          - { feature: contractor, path: "features/contractor/" }
          - { feature: crm, path: "features/crm/" }
          - { feature: marketing, path: "features/marketing/" }
          - { feature: onboarding, path: "features/onboarding/" }
          - { feature: projects, path: "features/projects/" }
          - { feature: templates, path: "features/templates/" }
          - { feature: misc, path: "lib/ components/ app/ tests/unit/" }
    steps:
      - name: Checkout code 📚
        uses: actions/checkout@v6
      - name: Setup Node & deps ⚙️
        uses: ./.github/actions/setup-node-deps
        with:
          node-version: ${{ env.NODE_VERSION }}
          install-playwright: "true"
      - name: Run tests for ${{ matrix.feature }} 🧪
        run: npm run test:path -- ${{ matrix.path }} --outputFile=.vitest-reports/blob-${{ matrix.feature }}.json
      - name: Upload blob report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: blob-${{ matrix.feature }}
          path: .vitest-reports/*
          retention-days: 1
          include-hidden-files: true

  report-coverage:
    name: Coverage Report 📊
    runs-on: ubuntu-latest
    needs: [test]
    if: always()
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout code 📚
        uses: actions/checkout@v6
      - name: Setup Node & deps ⚙️
        uses: ./.github/actions/setup-node-deps
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Download blob reports
        uses: actions/download-artifact@v8
        with:
          path: .vitest-reports
          pattern: blob-*
          merge-multiple: true
      - name: Merge reports & generate coverage
        run: npm run test:merge-reports
      - name: Report coverage to PR
        uses: davelosert/vitest-coverage-report-action@v2
        with:
          json-summary-path: coverage/coverage-summary.json
          json-final-path: coverage/coverage-final.json

  e2e-test:
    name: Playwright 🎭
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout code 📚
        uses: actions/checkout@v6
      - name: Setup Node & deps ⚙️
        uses: ./.github/actions/setup-node-deps
        with:
          node-version: ${{ env.NODE_VERSION }}
          install-playwright: "true"
          playwright-browsers: "all"
      - name: Build app 🏗️
        run: npm run build
      - name: Playwright tests check 🎭
        run: npm run test:e2e:ci
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout code 📚
        uses: actions/checkout@v6
      - name: Dependency Review
        uses: actions/dependency-review-action@v5
        with:
          comment-summary-in-pr: on-failure
